<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Roqiyeh Karimi</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
body { background: #000; color: #fff; height: 100vh; overflow: hidden; }
.bg-mesh { position: fixed; inset: 0; background: radial-gradient(at 0% 0%, #00b4d840 0%, #000 60%), radial-gradient(at 100% 100%, #ff4d6d33 0%, #000 60%); z-index: -1; }
.app-wrapper { height: 100vh; display: flex; flex-direction: column; padding: 20px; }
.header { padding: 20px; text-align: center; font-weight: 800; font-size: 1.2rem; letter-spacing: 2px; }
.control-card { margin-top: auto; background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border-radius: 35px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); }
.visualizer { height: 40px; display: flex; align-items: flex-end; justify-content: center; gap: 4px; margin-bottom: 20px; }
.bar { width: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; height: 10px; transition: 0.1s; }
.prog-container { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 30px; cursor: pointer; position: relative; }
.prog-grabber { position: absolute; width: 15px; height: 15px; background: #fff; border-radius: 50%; top: -4.5px; margin-left: -7px; }
#prog-fill { height: 100%; width: 0%; background: #fff; border-radius: 10px; }
.controls { display: flex; justify-content: center; align-items: center; gap: 40px; margin-bottom: 25px; }
.btn { background: none; border: none; color: #fff; font-size: 26px; cursor: pointer; }
.btn-play { font-size: 45px; }
.lib-btn { width: 100%; padding: 16px; background: rgba(255, 255, 255, 0.12); border: none; border-radius: 18px; color: #fff; font-weight: 600; cursor: pointer; }
.siar-text { text-align: center; font-size: 0.7rem; color: #666; margin-top: 15px; text-transform: uppercase; }
.panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%; background: #111; border-top-left-radius: 35px; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 100; overflow-y: auto; padding: 25px; }
.panel.active { bottom: 0; }
.song-item { padding: 18px; margin-bottom: 12px; background: rgba(255,255,255,0.05); border-radius: 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.star-icon.active { color: #ffd700; }
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="app-wrapper">
<div class="header">ROQIYEH KARIMI</div>
<div class="control-card">
<div class="visualizer" id="viz"></div>
<div class="prog-container" id="prog-hit"><div id="prog-fill"><div class="prog-grabber"></div></div></div>
<div class="controls">
<button class="btn" id="prev"><i class="fas fa-step-backward"></i></button>
<button class="btn btn-play" id="play"><i class="fas fa-play"></i></button>
<button class="btn" id="next"><i class="fas fa-step-forward"></i></button>
</div>
<button class="lib-btn" id="open-lib">LIBRARY</button>
<div class="siar-text">SIAR PRO MUSIC ENGINE 2026</div>
</div>
</div>
<div class="panel" id="panel">
<button class="btn" id="close-lib" style="margin-bottom:20px"><i class="fas fa-times"></i></button>
<div id="list-target"></div>
</div>
<script>
const audio = new Audio();
let currentIdx = parseInt(localStorage.getItem('lastPlayed')) || 0;
let starred = JSON.parse(localStorage.getItem('starred')) || [];
const viz = document.getElementById('viz');
for(let i=0; i<15; i++) viz.innerHTML += '<div class="bar"></div>';

function renderList() {
const list = document.getElementById('list-target');
list.innerHTML = '';
for(let i=0; i<50; i++) {
let div = document.createElement('div');
div.className = 'song-item';
div.id = 'song-' + i;
div.innerHTML = <span&gt;Track ${i+1}</span><i class="fas fa-star star-icon ${starred.includes(i)?'active':''}"&gt;&lt;/i>;
div.onclick = (e) => {
if(e.target.classList.contains('fa-star')) {
if(starred.includes(i)) starred = starred.filter(s => s !== i);
else starred.push(i);
localStorage.setItem('starred', JSON.stringify(starred));
renderList();
} else {
playTrack(i);
document.getElementById('panel').classList.remove('active');
}
};
list.appendChild(div);
}
}

function playTrack(i) {
currentIdx = i;
audio.src = (i+1) + '.mp3';
audio.play();
localStorage.setItem('lastPlayed', i);
document.getElementById('song-'+i).scrollIntoView({ behavior: 'smooth', block: 'center' });
}

document.getElementById('play').onclick = () => audio.paused ? audio.play() : audio.pause();
audio.onplay = () => { document.getElementById('play').innerHTML = '<i class="fas fa-pause"></i>'; setInterval(() => document.querySelectorAll('.bar').forEach(b => b.style.height = (Math.random()*30+5)+'px'), 100); };
audio.onpause = () => document.getElementById('play').innerHTML = '<i class="fas fa-play"></i>';
audio.ontimeupdate = () => document.getElementById('prog-fill').style.width = (audio.currentTime/audio.duration)*100 + '%';
document.getElementById('open-lib').onclick = () => { document.getElementById('panel').classList.add('active'); setTimeout(() => document.getElementById('song-'+currentIdx).scrollIntoView({ block: 'center' }), 300); };
document.getElementById('close-lib').onclick = () => document.getElementById('panel').classList.remove('active');
renderList();
</script>
</body>
</html>
