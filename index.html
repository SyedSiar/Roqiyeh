<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roqiyeh Karimi</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .bg { position: fixed; inset: 0; background: #111; z-index: -1; }
        .header { padding: 30px; text-align: center; font-weight: 800; font-size: 20px; }
        .card { position: absolute; bottom: 50px; left: 20px; right: 20px; background: #222; padding: 30px; border-radius: 20px; text-align: center; }
        button { background: #444; color: #fff; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 18px; margin: 5px; }
        .panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 80%; background: #000; transition: 0.3s; overflow-y: auto; padding: 20px; }
        .panel.show { bottom: 0; }
        .row { padding: 20px; border-bottom: 1px solid #333; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="header">ROQIYEH KARIMI</div>
    <div class="card">
        <button id="play-btn">PLAY / PAUSE</button>
        <button id="open-btn">LIBRARY</button>
    </div>
    <div class="panel" id="panel">
        <button id="close-btn">CLOSE</button>
        <div id="list"></div>
    </div>

    <script>
        const audio = new Audio();
        const list = document.getElementById('list');
        const panel = document.getElementById('panel');

        // Library generate karein
        for(let i=1; i<=50; i++) {
            let d = document.createElement('div');
            d.className = 'row';
            d.innerText = 'Track ' + i;
            d.onclick = () => {
                audio.src = i + '.mp3';
                audio.play();
                panel.classList.remove('show');
            };
            list.appendChild(d);
        }

        document.getElementById('play-btn').onclick = () => audio.paused ? audio.play() : audio.pause();
        document.getElementById('open-btn').onclick = () => panel.classList.add('show');
        document.getElementById('close-btn').onclick = () => panel.classList.remove('show');
    </script>
</body>
</html>
