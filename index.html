<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roqiyeh Karimi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; }
        .bg-mesh { position: fixed; inset: 0; background: radial-gradient(at 0% 0%, #00b4d840 0%, #000 60%); z-index: -1; }
        .app-wrapper { height: 100vh; display: flex; flex-direction: column; padding: 20px; }
        .control-card { margin-top: auto; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-radius: 35px; padding: 30px; }
        .btn { background: none; border: none; color: #fff; font-size: 30px; cursor: pointer; padding: 10px; }
        .lib-btn { width: 100%; padding: 16px; background: #333; border: none; border-radius: 18px; color: #fff; margin-top: 20px; }
        .panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%; background: #111; transition: 0.4s; z-index: 100; overflow-y: auto; padding: 25px; }
        .panel.active { bottom: 0; }
        .song-item { padding: 20px; border-bottom: 1px solid #222; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="app-wrapper">
        <div class="control-card">
            <button class="btn" id="play"><i class="fas fa-play"></i></button>
            <button class="lib-btn" id="open-lib">LIBRARY</button>
        </div>
    </div>
    <div class="panel" id="panel">
        <button class="btn" id="close-lib"><i class="fas fa-times"></i></button>
        <div id="list-target"></div>
    </div>
    <script>
        const audio = new Audio();
        const panel = document.getElementById('panel');
        const list = document.getElementById('list-target');
        const playBtn = document.getElementById('play');

        for(let i=1; i<=50; i++) {
            let div = document.createElement('div');
            div.className = 'song-item';
            div.innerText = 'Track ' + i;
            div.onclick = () => {
                audio.src = i + '.mp3'; 
                audio.play();
                panel.classList.remove('active');
            };
            list.appendChild(div);
        }

        playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();
        document.getElementById('open-lib').onclick = () => panel.classList.add('active');
        document.getElementById('close-lib').onclick = () => panel.classList.remove('active');
    </script>
</body>
</html>
