<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roqiyeh Karimi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .card { position: absolute; bottom: 30px; left: 20px; right: 20px; background: #222; padding: 25px; border-radius: 25px; text-align: center; }
        .controls { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .btn { background: #333; border: none; color: #fff; padding: 15px 25px; border-radius: 15px; cursor: pointer; font-size: 20px; }
        .panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 80%; background: #111; transition: 0.4s; padding: 20px; overflow-y: auto; }
        .panel.active { bottom: 0; }
        .row { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="controls">
            <button id="prev"><i class="fas fa-step-backward"></i></button>
            <button id="play" class="btn"><i class="fas fa-play"></i></button>
            <button id="next"><i class="fas fa-step-forward"></i></button>
        </div>
        <button id="open" style="width:100%; padding:15px; border-radius:15px; border:none;">LIBRARY</button>
    </div>
    <div class="panel" id="panel">
        <button id="close" style="margin-bottom:20px;">CLOSE</button>
        <div id="list"></div>
    </div>
    <script>
        const audio = new Audio();
        let idx = 1;
        const playBtn = document.getElementById('play');

        function playTrack(i) {
            idx = i;
            audio.src = i + '.mp3';
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }

        // Library Generator
        const list = document.getElementById('list');
        for(let i=1; i<=50; i++) {
            let div = document.createElement('div');
            div.className = 'row';
            div.innerText = 'Track ' + i;
            div.onclick = () => { playTrack(i); document.getElementById('panel').classList.remove('active'); };
            list.appendChild(div);
        }

        playBtn.onclick = () => {
            if(audio.paused) { audio.play(); playBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); playBtn.innerHTML = '<i class="fas fa-play"></i>'; }
        };

        document.getElementById('next').onclick = () => playTrack(idx < 50 ? idx + 1 : 1);
        document.getElementById('prev').onclick = () => playTrack(idx > 1 ? idx - 1 : 50);
        document.getElementById('open').onclick = () => document.getElementById('panel').classList.add('active');
        document.getElementById('close').onclick = () => document.getElementById('panel').classList.remove('active');
    </script>
</body>
</html>
