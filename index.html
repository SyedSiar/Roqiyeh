<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Player</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .log { color: yellow; margin-top: 20px; font-size: 12px; }
        button { padding: 20px 40px; font-size: 20px; margin: 10px; }
    </style>
</head>
<body>
    <div id="status">Player Ready</div>
    <button onclick="testPlay()">CLICK TO PLAY TRACK 1</button>
    <div class="log" id="log"></div>

    <script>
        const audio = new Audio();
        const log = document.getElementById('log');

        function testPlay() {
            // Hum yahan file path ko force kar rahe hain
            const path = '1.mp3'; 
            audio.src = path;
            
            log.innerText = "Attempting to play: " + path;
            
            audio.play().then(() => {
                log.innerText = "Success! Playing: " + path;
            }).catch(e => {
                log.innerText = "Error: " + e.message + ". Check if " + path + " exists in root.";
            });
        }
    </script>
</body>
</html>
